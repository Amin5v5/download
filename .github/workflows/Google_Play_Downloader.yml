name: '⬇️ دانلود از گوگل پلی'

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '⚡️ حالت اجرا (Full = ذخیره در مخزن، Fast = فقط Artifact)'
        required: true
        type: choice
        options:
          - 'Full (دانلود + commit در مخزن)'
          - 'Fast (فقط دانلود، بدون commit)'
        default: 'Full (دانلود + commit در مخزن)'
      package_name:
        description: '📦 نام پکیج یا لینک گوگل‌پلی'
        required: true
        type: string
        default: ''
      output_folder:
        description: '📁 پوشه ذخیره‌سازی (فقط در حالت Full کاربرد دارد)'
        required: false
        type: string
        default: 'downloads/GooglePlay'
      architecture:
        description: '⚙️ معماری پردازنده'
        required: false
        type: choice
        options:
          - 'arm64-v8a'
          - 'auto (همه)'
          - 'armeabi-v7a'
          - 'x86'
          - 'x86_64'
        default: 'arm64-v8a'
      max_part_mb:
        description: '✂️ حداکثر اندازه قطعه (مگابایت)'
        required: false
        type: number
        default: 90
  repository_dispatch:
    types: [googleplay-download]

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # Checkout only for Full mode با sparse-checkout برای سرعت بالا
      - name: ⚡️ Checkout
        if: github.event.inputs.mode == 'Full (دانلود + commit در مخزن)' || github.event_name == 'repository_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            downloads/GooglePlay/

      - name: ⚙️ Set variables from repository_dispatch
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "MODE=Full" >> $GITHUB_ENV
          echo "PACKAGE=${{ github.event.client_payload.package_name }}" >> $GITHUB_ENV
          echo "OUTPUT_FOLDER=${{ github.event.client_payload.output_folder || 'downloads/GooglePlay' }}" >> $GITHUB_ENV
          echo "ARCHITECTURE=${{ github.event.client_payload.architecture || 'arm64-v8a' }}" >> $GITHUB_ENV
          echo "MAX_PART_MB=${{ github.event.client_payload.max_part_mb || 90 }}" >> $GITHUB_ENV

      - name: ⚙️ Set variables from workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "${{ github.event.inputs.mode }}" == *"Fast"* ]]; then
            echo "MODE=Fast" >> $GITHUB_ENV
          else
            echo "MODE=Full" >> $GITHUB_ENV
          fi
          echo "PACKAGE=${{ github.event.inputs.package_name }}" >> $GITHUB_ENV
          echo "OUTPUT_FOLDER=${{ github.event.inputs.output_folder }}" >> $GITHUB_ENV
          echo "ARCHITECTURE=${{ github.event.inputs.architecture }}" >> $GITHUB_ENV
          echo "MAX_PART_MB=${{ github.event.inputs.max_part_mb }}" >> $GITHUB_ENV

      - name: 💾 Cache apkeep
        id: cache-apkeep
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/apkeep
          key: ${{ runner.os }}-apkeep-v0.18.0

      - name: 🌐 Install apkeep
        if: steps.cache-apkeep.outputs.cache-hit != 'true'
        run: |
          curl -sL https://github.com/EFForg/apkeep/releases/latest/download/apkeep-x86_64-unknown-linux-gnu -o apkeep
          chmod +x apkeep
          sudo mv apkeep /usr/local/bin/apkeep

      - name: 🔍 Extract package name
        run: |
          INPUT="$PACKAGE"
          if [[ "$INPUT" =~ play.google.com/store/apps/details\?id=([^&]+) ]]; then
            PACKAGE="${BASH_REMATCH[1]}"
          fi
          echo "PACKAGE=$PACKAGE" >> $GITHUB_ENV

      - name: ⬇️ Download APK
        run: |
          mkdir -p /tmp/apkeep_dl
          apkeep -a "$PACKAGE" /tmp/apkeep_dl

      - name: 🧩 Process APK
        id: process-apk
        run: |
          BASE_FOLDER="$OUTPUT_FOLDER"
          DATE_PART=$(date +'%Y.%m.%d')
          PACKAGE="$PACKAGE"
          ARCH="$ARCHITECTURE"
          THRESH_MB="$MAX_PART_MB"

          if [ "$MODE" = "Fast" ]; then
            FINAL_DIR="$GITHUB_WORKSPACE/fast_output"
          else
            BASE="${BASE_FOLDER}/${DATE_PART} - ${PACKAGE}"
            FINAL_DIR="$BASE"
            i=1
            while [ -d "$FINAL_DIR" ]; do
              FINAL_DIR="${BASE}_${i}"
              i=$((i+1))
            done
          fi
          mkdir -p "$FINAL_DIR"
          FINAL_DIR=$(realpath "$FINAL_DIR")
          echo "FINAL_DIR=$FINAL_DIR" >> $GITHUB_ENV

          DOWNLOADED_FILE=$(find /tmp/apkeep_dl -maxdepth 1 -type f \( -name '*.apk' -o -name '*.xapk' -o -name '*.apks' \) -print -quit 2>/dev/null)
          if [ -z "$DOWNLOADED_FILE" ]; then
            echo "STATUS=failed" >> $GITHUB_ENV
            exit 1
          fi

          if [[ "$DOWNLOADED_FILE" == *.xapk ]] || [[ "$DOWNLOADED_FILE" == *.apks ]]; then
            TEMP_EXTRACT="/tmp/extracted_apks"
            mkdir -p "$TEMP_EXTRACT"
            unzip -o "$DOWNLOADED_FILE" -d "$TEMP_EXTRACT" > /dev/null
            rm "$DOWNLOADED_FILE"
            APK_SOURCE="$TEMP_EXTRACT"
          else
            APK_SOURCE="/tmp/apkeep_dl"
          fi

          KNOWN_ARCHS=("arm64-v8a" "armeabi-v7a" "x86" "x86_64")
          VALID_APKS=()
          for apk in "$APK_SOURCE"/*.apk; do
            [ -f "$apk" ] || continue
            apk_name=$(basename "$apk")
            if [ "$ARCH" = "auto (همه)" ]; then
              VALID_APKS+=("$apk")
              continue
            fi
            if [[ "$apk_name" == "base.apk" ]] || [[ "$apk_name" == config.* ]]; then
              VALID_APKS+=("$apk")
              continue
            fi
            if [[ "$apk_name" == *"${ARCH}"* ]]; then
              VALID_APKS+=("$apk")
              continue
            fi
            HAS_KNOWN_ARCH=false
            for known in "${KNOWN_ARCHS[@]}"; do
              if [[ "$apk_name" == *"$known"* ]]; then
                HAS_KNOWN_ARCH=true
                break
              fi
            done
            if ! $HAS_KNOWN_ARCH; then
              VALID_APKS+=("$apk")
            fi
          done

          if [ ${#VALID_APKS[@]} -eq 0 ]; then
            echo "STATUS=failed" >> $GITHUB_ENV
            exit 1
          fi

          SPLIT_STATUS="false"
          TOTAL_SIZE=0
          if [ ${#VALID_APKS[@]} -eq 1 ]; then
            FINAL_NAME="${DATE_PART} - ${PACKAGE}.apk"
            SIZE=$(stat -c%s "${VALID_APKS[0]}")
            TOTAL_SIZE=$SIZE
            MAX_BYTES=$((THRESH_MB * 1024 * 1024))
            if [ "$THRESH_MB" -gt 0 ] && [ "$SIZE" -gt "$MAX_BYTES" ]; then
              zip -j -s "${THRESH_MB}m" "$FINAL_DIR/${FINAL_NAME}.zip" "${VALID_APKS[0]}" > /dev/null
              SPLIT_STATUS="true"
              FINAL_FILENAME="${FINAL_NAME}.zip"
            else
              cp "${VALID_APKS[0]}" "$FINAL_DIR/$FINAL_NAME"
              FINAL_FILENAME="$FINAL_NAME"
            fi
          else
            TEMP_MERGE="/tmp/merge_apks"
            mkdir -p "$TEMP_MERGE"
            for vapk in "${VALID_APKS[@]}"; do
              cp "$vapk" "$TEMP_MERGE/"
            done
            FINAL_ARCHIVE="${DATE_PART} - ${PACKAGE}.apks"
            cd "$TEMP_MERGE" || exit 1
            zip -r "$FINAL_DIR/$FINAL_ARCHIVE" ./*.apk > /dev/null
            cd - || exit 1
            SIZE=$(stat -c%s "$FINAL_DIR/$FINAL_ARCHIVE")
            TOTAL_SIZE=$SIZE
            MAX_BYTES=$((THRESH_MB * 1024 * 1024))
            if [ "$THRESH_MB" -gt 0 ] && [ "$SIZE" -gt "$MAX_BYTES" ]; then
              cd "$FINAL_DIR" || exit 1
              zip -s "${THRESH_MB}m" "${FINAL_ARCHIVE}.zip" "$FINAL_ARCHIVE" > /dev/null
              rm "$FINAL_ARCHIVE"
              cd - || exit 1
              SPLIT_STATUS="true"
              FINAL_FILENAME="${FINAL_ARCHIVE}.zip"
            else
              FINAL_FILENAME="$FINAL_ARCHIVE"
            fi
            rm -rf "$TEMP_MERGE"
          fi

          echo "SPLIT=$SPLIT_STATUS" >> $GITHUB_ENV
          echo "TOTAL_SIZE=$TOTAL_SIZE" >> $GITHUB_ENV
          echo "FINAL_FILENAME=$FINAL_FILENAME" >> $GITHUB_ENV
          echo "STATUS=success" >> $GITHUB_ENV
          rm -rf /tmp/apkeep_dl /tmp/extracted_apks 2>/dev/null

      - name: 📊 نمایش جدول وضعیت
        run: |
          SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1048576" | bc)
          SIZE_KB=$(echo "scale=2; $TOTAL_SIZE / 1024" | bc)
          if (( $(echo "$SIZE_MB >= 1" | bc -l) )); then
            SIZE_HR="${SIZE_MB} MB"
          else
            SIZE_HR="${SIZE_KB} KB"
          fi

          echo "## 📋 گزارش نهایی دانلود" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| وضعیت | نام بسته | معماری | نام فایل | حجم کل | تاریخ |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|--------|----------|--------|-------|" >> $GITHUB_STEP_SUMMARY

          if [ "$STATUS" = "success" ]; then
            STATUS_FA="✅ موفق"
          else
            STATUS_FA="❌ ناموفق"
          fi

          echo "| $STATUS_FA | \`$PACKAGE\` | \`$ARCHITECTURE\` | \`$FINAL_FILENAME\` | $SIZE_HR | $(date +'%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$MODE" = "Fast" ]; then
            echo "### ⚡️ حالت سریع: فایل به عنوان Artifact ذخیره شد" >> $GITHUB_STEP_SUMMARY
            echo "بعد از اتمام کار، می‌توانید فایل را از بخش **Actions** → **این اجرا** → **Artifacts** (پایین همین صفحه) دانلود کنید." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> 📌 فایل دانلودی تا **90 روز** در GitHub نگهداری می‌شود، سپس به‌طور خودکار پاک می‌گردد." >> $GITHUB_STEP_SUMMARY
          else
            WORKSPACE="${{ github.workspace }}"
            REL_DIR=$(echo "$FINAL_DIR" | sed "s|^${WORKSPACE}/||")
            ENCODED_DIR=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${REL_DIR}', safe='/'))")
            if [ "$SPLIT" = "true" ]; then
              echo "### 📁 لینک دسترسی به پوشه (فایل چندتکه)" >> $GITHUB_STEP_SUMMARY
              echo "[➡️ کلیک کنید تا پوشه حاوی فایل‌ها را ببینید](https://github.com/${{ github.repository }}/tree/main/${ENCODED_DIR})" >> $GITHUB_STEP_SUMMARY
            else
              ENCODED_FILE=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${FINAL_FILENAME}', safe='/'))")
              RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/${ENCODED_DIR}/${ENCODED_FILE}"
              echo "### 📁 لینک دانلود مستقیم (فایل یکتکه)" >> $GITHUB_STEP_SUMMARY
              echo "[⬇️ دانلود فایل ${FINAL_FILENAME}](${RAW_URL})" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 🕒 زمان اتمام: $(date)" >> $GITHUB_STEP_SUMMARY

      - name: ✅ Verify artifact file exists (Fast mode only)
        if: env.MODE == 'Fast' && env.STATUS == 'success'
        run: |
          if [ ! -f "$FINAL_DIR/$FINAL_FILENAME" ]; then
            echo "ERROR: File not found at $FINAL_DIR/$FINAL_FILENAME"
            exit 1
          fi

      - name: 💾 Save and upload to repository (Full mode only)
        if: env.MODE == 'Full'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$OUTPUT_FOLDER/"
          git commit -m "Download APK: $PACKAGE [skip ci]" || true
          git push

      - name: 📦 Upload APK as Artifact (Fast mode only)
        if: env.MODE == 'Fast' && env.STATUS == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: "APK - ${{ env.PACKAGE }} - ${{ env.ARCHITECTURE }}"
          path: "${{ env.FINAL_DIR }}/${{ env.FINAL_FILENAME }}"
          if-no-files-found: error
          retention-days: 90
