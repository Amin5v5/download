name: '📥 دانلود از یوتیوب'

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '🔗 لینک ویدیوی یوتیوب'
        required: true
        type: string
      output_format:
        description: '🎬 نوع خروجی'
        required: true
        type: choice
        options:
          - 'mp4 (ویدیو)'
          - 'mp3 (فقط صدا)'
        default: 'mp4 (ویدیو)'
      desired_quality:
        description: '🎚️ کیفیت / بیت‌ریت'
        required: true
        type: choice
        options:
          - '480p'
          - '720p'
          - '1080p'
          - '360p'
          - '192kbps'
          - '320kbps'
          - '128kbps'
          - '64kbps'
        default: '720p'
      max_part_mb:
        description: '✂️ حداکثر حجم هر قسمت (MB) - ۰ = خودکار ۱۸۰۰ مگابایت'
        required: false
        type: string
        default: '90'
      upload_method:
        description: '📤 روش ذخیره نهایی'
        required: true
        type: choice
        options:
          - 'repository (ذخیره در مخزن)'
          - 'release (انتشار در GitHub Releases)'
        default: 'repository (ذخیره در مخزن)'
      release_tag:
        description: '🏷️ نام تگ ریلیز (فقط در صورت انتخاب Release)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  youtube-download:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: ⚡️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 نصب پیش‌نیازها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip curl python3 python3-pip
          pip3 install --quiet requests

      - name: 🔗 دریافت لینک دانلود
        id: retrieve
        run: |
          python3 << 'EOF'
          import os, sys, time, re, requests

          URL = os.environ.get('INPUT_URL')
          FMT = os.environ.get('INPUT_FORMAT')
          QUAL = os.environ.get('INPUT_QUALITY')

          is_audio = FMT == 'mp3'
          if is_audio:
              if 'kbps' not in QUAL:
                  QUAL = '192kbps'
          else:
              if 'p' not in QUAL:
                  QUAL = '720p'

          payload = {
              "url": URL,
              "os": "linux",
              "output": {"type": "audio" if is_audio else "video", "format": FMT}
          }
          if is_audio:
              payload["audio"] = {"bitrate": QUAL}
          else:
              payload["output"]["quality"] = QUAL

          s = requests.Session()
          s.headers.update({"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"})
          s.get("https://media.ytmp3.gg/")
          resp = s.post("https://hub.ytconvert.org/api/download", json=payload, timeout=30)
          resp.raise_for_status()
          data = resp.json()
          status_url = data.get('statusUrl')
          title = data.get('title', 'video')
          dl_url = None
          for _ in range(150):
              time.sleep(2)
              r = s.get(status_url, timeout=20)
              status = r.json()
              if status.get('status') == 'completed':
                  dl_url = status.get('downloadUrl')
                  break
              if status.get('status') == 'failed':
                  print("::error::Server failed to prepare the video")
                  sys.exit(1)

          if not dl_url:
              print("::error::Could not get download link")
              sys.exit(1)

          vid = re.search(r'(?:v=|youtu\.be/)([a-zA-Z0-9_-]{11})', URL)[1]
          clean = re.sub(r'[^a-zA-Z0-9\-_()\[\]]', '_', title.replace(' ', '_'))
          clean = re.sub(r'_+', '_', clean).strip('_')[:70] or vid
          clean = clean.lstrip('-')
          fname = f"{clean}_{vid}_{QUAL}.{FMT}"

          with open(".download_info", "w", encoding="utf-8") as f:
              f.write(f"{dl_url}\n{fname}\n{title}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"filename={fname}\n")
              f.write(f"title={title}\n")
              f.write(f"vid={vid}\n")
          EOF
        env:
          INPUT_URL: ${{ github.event.inputs.video_url }}
          INPUT_FORMAT: ${{ github.event.inputs.output_format == 'mp4 (ویدیو)' && 'mp4' || 'mp3' }}
          INPUT_QUALITY: ${{ github.event.inputs.desired_quality }}

      - name: 📥 دانلود فایل
        run: |
          DL_URL=$(head -1 .download_info)
          FILENAME=$(sed -n '2p' .download_info)
          mkdir -p release_files
          curl -L --fail --progress-bar -o "release_files/$FILENAME" "$DL_URL" > /dev/null 2>&1
          if [ ! -s "release_files/$FILENAME" ]; then
            echo "::error::Downloaded file is empty!"
            exit 1
          fi

      - name: ✂️ تقسیم فایل بزرگ (در صورت نیاز)
        id: split
        run: |
          FILENAME="${{ steps.retrieve.outputs.filename }}"
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"
          if [[ "$THRESH_MB" -le 0 ]] || [[ "$THRESH_MB" -gt 1900 ]]; then
            THRESH_MB=1800
          fi
          FILESIZE=$(stat -c%s "release_files/$FILENAME" 2>/dev/null || echo 0)
          THRESH_BYTES=$((THRESH_MB * 1024 * 1024))
          if [ "$FILESIZE" -gt "$THRESH_BYTES" ]; then
            BASE="${FILENAME%.*}"
            cd release_files
            zip -r -s "${THRESH_MB}m" "${BASE}.zip" "./$FILENAME" > /dev/null
            rm -- "$FILENAME"
            cd ..
            echo "SPLIT=true" >> $GITHUB_ENV
            # محاسبه حجم کل (مجموع قسمت‌ها)
            TOTAL_SIZE=$(du -sb release_files/ | cut -f1)
            echo "TOTAL_SIZE=$TOTAL_SIZE" >> $GITHUB_ENV
          else
            echo "SPLIT=false" >> $GITHUB_ENV
            echo "TOTAL_SIZE=$FILESIZE" >> $GITHUB_ENV
          fi

      - name: 📤 آپلود در مخزن (repository)
        if: github.event.inputs.upload_method == 'repository (ذخیره در مخزن)'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          VID="${{ steps.retrieve.outputs.vid }}"
          DATE=$(date +'%Y.%m.%d')
          FOLDER="downloads/YouTube/${DATE} - ${VID}"
          mkdir -p "$FOLDER"
          
          mv release_files/* "$FOLDER/"
          echo "DOWNLOAD_FOLDER=${FOLDER}" >> $GITHUB_ENV
          
          git add downloads/
          git commit -m "⬇️ YouTube: ${{ steps.retrieve.outputs.filename }} [skip ci]" || true
          git push

      - name: 📤 آپلود در GitHub Releases
        if: github.event.inputs.upload_method == 'release (انتشار در GitHub Releases)'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('yt-{0}', github.run_number) }}
          name: ${{ format('YouTube - {0}', steps.retrieve.outputs.filename) }}
          body: |
            **📽️ YouTube Download**
            **Title:** ${{ steps.retrieve.outputs.title }}
            **Original Link:** ${{ github.event.inputs.video_url }}
            **Quality:** ${{ github.event.inputs.desired_quality }}
            **Format:** ${{ github.event.inputs.output_format }}
          files: release_files/*
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false

      - name: 📊 نمایش جدول وضعیت
        if: always() && (steps.retrieve.outcome == 'success')
        run: |
          FILENAME="${{ steps.retrieve.outputs.filename }}"
          TITLE="${{ steps.retrieve.outputs.title }}"
          QUALITY="${{ github.event.inputs.desired_quality }}"
          FORMAT="${{ github.event.inputs.output_format }}"
          TOTAL_SIZE="${{ env.TOTAL_SIZE }}"
          SPLIT_STATUS="${{ env.SPLIT }}"
          UPLOAD_METHOD="${{ github.event.inputs.upload_method }}"
          
          # محاسبه حجم به صورت خوانا
          SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1048576" | bc)
          SIZE_KB=$(echo "scale=2; $TOTAL_SIZE / 1024" | bc)
          if (( $(echo "$SIZE_MB >= 1" | bc -l) )); then
            SIZE_HR="${SIZE_MB} MB"
          else
            SIZE_HR="${SIZE_KB} KB"
          fi
          
          echo "## 📋 گزارش نهایی دانلود" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| وضعیت | عنوان | کیفیت | فرمت | حجم کل | تاریخ |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|-------|------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ موفق | \`${TITLE}\` | \`${QUALITY}\` | \`${FORMAT}\` | ${SIZE_HR} | $(date +'%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # لینک دسترسی بر اساس روش آپلود
          if [[ "$UPLOAD_METHOD" == *"repository"* ]]; then
            REPO="${{ github.repository }}"
            FOLDER="${{ env.DOWNLOAD_FOLDER }}"
            ENCODED_FOLDER=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${FOLDER}', safe='/'))")
            FOLDER_URL="https://github.com/${REPO}/tree/main/${ENCODED_FOLDER}"
            
            echo "### 📁 لینک دسترسی به پوشه (ذخیره شده در مخزن)" >> $GITHUB_STEP_SUMMARY
            echo "[➡️ کلیک کنید تا فایل‌ها را در ${FOLDER} ببینید](${FOLDER_URL})" >> $GITHUB_STEP_SUMMARY
            
            if [ "$SPLIT_STATUS" = "false" ]; then
              # لینک مستقیم raw
              RAW_FILENAME=$(ls "$FOLDER" | head -1)
              ENCODED_FILE=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${RAW_FILENAME}', safe=''))")
              RAW_URL="https://raw.githubusercontent.com/${REPO}/main/${ENCODED_FOLDER}/${ENCODED_FILE}"
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### ⬇️ لینک دانلود مستقیم (فایل یک تکه)" >> $GITHUB_STEP_SUMMARY
              echo "[دانلود ${RAW_FILENAME}](${RAW_URL})" >> $GITHUB_STEP_SUMMARY
            else
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "💡 فایل به چند قسمت ${SIZE_HR} تقسیم شده است. همه قسمت‌ها را از پوشه بالا دانلود کنید." >> $GITHUB_STEP_SUMMARY
            fi
          else
            TAG="${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('yt-{0}', github.run_number) }}"
            RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"
            echo "### 📦 فایل در GitHub Releases" >> $GITHUB_STEP_SUMMARY
            echo "[➡️ مشاهده Release](${RELEASE_URL})" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 🕒 زمان اتمام: $(date)" >> $GITHUB_STEP_SUMMARY

      - name: 🧹 پاکسازی
        if: always()
        run: rm -rf release_files .download_info 2>/dev/null || true
