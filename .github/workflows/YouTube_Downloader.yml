name: 'دانلودر یوتیوب (Piped)'

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیو (YouTube URL)'
        required: true
        type: string
      output_format:
        description: 'نوع خروجی'
        required: true
        type: choice
        options:
          - 'mp4 (video)'
          - 'mp3 (audio only)'
        default: 'mp4 (video)'
      desired_quality:
        description: 'کیفیت (ویدیو: 360p, 720p, 1080p | صدا: 128kbps, 192kbps)'
        required: false
        type: string
        default: '720p'
      max_part_mb:
        description: 'حداکثر حجم هر قسمت (MB) – 0 = 1800'
        required: false
        type: string
        default: '90'
      upload_method:
        description: '📤 روش ذخیره'
        required: true
        type: choice
        options:
          - 'repository (push to repo)'
          - 'release (GitHub Releases)'
        default: 'repository (push to repo)'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: استخراج video ID
        run: |
          URL="${{ github.event.inputs.video_url }}"
          VID=$(echo "$URL" | sed -n 's/.*v=\([a-zA-Z0-9_-]\{11\}\).*/\1/p')
          if [ -z "$VID" ]; then
            echo "::error::شناسه ویدیو پیدا نشد"
            exit 1
          fi
          echo "VID=$VID" >> $GITHUB_ENV

      - name: دریافت لینک‌های استریم از Piped
        run: |
          VID="${{ env.VID }}"
          # لیست کامل و به‌روز شده از نمونه‌های Piped
          INSTANCES=(
            "https://pipedapi.kavin.rocks"        # Official
            "https://pipedapi-libre.kavin.rocks"  # Official Libre
            "https://pipedapi.leptons.xyz"
            "https://pipedapi.nosebs.ru"
            "https://piped-api.privacy.com.de"
            "https://pipedapi.adminforge.de"
            "https://api.piped.yt"
            "https://pipedapi.drgns.space"
            "https://pipedapi.owo.si"
            "https://pipedapi.ducks.party"
            "https://piped-api.codespace.cz"
            "https://pipedapi.reallyaweso.me"
            "https://api.piped.private.coffee"
            "https://pipedapi.darkness.services"
            "https://pipedapi.orangenet.cc"
            "https://pipedapi.tokhmi.xyz"
            "https://pipedapi.syncpundit.io"
            "https://pipedapi.moomoo.me"
          )
          STREAMS=""
          for BASE in "${INSTANCES[@]}"; do
            echo "تلاش با $BASE ..."
            RESP=$(curl -s --max-time 15 "${BASE}/streams/${VID}")
            if echo "$RESP" | jq -e '.videoStreams' >/dev/null 2>&1; then
              STREAMS="$RESP"
              echo "اتصال موفقیت‌آمیز به $BASE"
              break
            else
              echo "ناموفق: $BASE"
            fi
          done
          if [ -z "$STREAMS" ]; then
            echo "::error::هیچ نمونه Piped در دسترس نیست. لطفاً کمی بعد دوباره تلاش کنید."
            exit 1
          fi
          echo "$STREAMS" > streams.json
          echo "✅ اطلاعات استریم دریافت شد"

      - name: انتخاب استریم مناسب و دانلود
        run: |
          FORMAT="${{ github.event.inputs.output_format }}"
          QUAL="${{ github.event.inputs.desired_quality }}"
          mkdir -p release_files

          if [ "$FORMAT" = "mp3 (audio only)" ]; then
            # انتخاب بهترین audio با bitrate نزدیک
            BITRATE=$(echo "$QUAL" | sed 's/kbps//')
            AUDIO_URL=$(jq -r --arg BR "$BITRATE" '
              .audioStreams
              | map(select(.bitrate != null))
              | sort_by(.bitrate)
              | last
              | .url' streams.json)
            if [ -z "$AUDIO_URL" ]; then
              echo "::error::استریم صوتی پیدا نشد"
              exit 1
            fi
            echo "دانلود صدا ..."
            curl -L -o "release_files/audio.webm" "$AUDIO_URL"
            ffmpeg -y -i "release_files/audio.webm" -b:a "${BITRATE}k" "release_files/output.mp3"
            rm "release_files/audio.webm"
          else
            # کیفیت ویدیو: تبدیل ورودی به حداکثر ارتفاع
            HEIGHT=$(echo "$QUAL" | sed 's/p//')
            # انتخاب بهترین ویدیو با ارتفاع <= درخواستی
            VIDEO_URL=$(jq -r --arg H "$HEIGHT" '
              .videoStreams
              | map(select(.height != null and .height <= ($H|tonumber)))
              | sort_by(.height)
              | last
              | .url' streams.json)
            # انتخاب بهترین صدا
            AUDIO_URL=$(jq -r '
              .audioStreams
              | map(select(.bitrate != null))
              | sort_by(.bitrate)
              | last
              | .url' streams.json)

            if [ -z "$VIDEO_URL" ] || [ -z "$AUDIO_URL" ]; then
              echo "::error::استریم ویدیو/صدا یافت نشد"
              exit 1
            fi
            echo "دانلود ویدیو ..."
            curl -L -o "release_files/video.webm" "$VIDEO_URL"
            echo "دانلود صدا ..."
            curl -L -o "release_files/audio.webm" "$AUDIO_URL"
            echo "ادغام با ffmpeg ..."
            ffmpeg -y -i "release_files/video.webm" -i "release_files/audio.webm" -c copy "release_files/output.mp4"
            rm "release_files/video.webm" "release_files/audio.webm"
          fi

          if [ ! -s release_files/output.* ]; then
            echo "::error::فایل خروجی ایجاد نشد"
            exit 1
          fi
          echo "✅ دانلود کامل شد"
          ls -lh release_files/

      - name: تقسیم فایل در صورت نیاز
        run: |
          MAX_MB="${{ github.event.inputs.max_part_mb }}"
          if [ "$MAX_MB" -le 0 ] || [ "$MAX_MB" -gt 1800 ]; then
            MAX_MB=1800
          fi
          cd release_files
          for f in *; do
            if [ ! -f "$f" ]; then continue; fi
            SIZE=$(stat -c%s "$f")
            if [ "$SIZE" -gt $((MAX_MB * 1024 * 1024)) ]; then
              echo "🔪 تقسیم $f به ${MAX_MB}MB ..."
              BASE="${f%.*}"
              zip -r -s "${MAX_MB}m" "${BASE}.zip" "./$f"
              rm "$f"
            fi
          done
          ls -lh

      - name: ذخیره در مخزن
        if: github.event.inputs.upload_method == 'repository (push to repo)'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          mkdir -p downloads
          mv release_files/* downloads/
          git add downloads/
          git commit -m "⬇️ YouTube: ${{ env.VID }}" || echo "Nothing to commit"
          git push

      - name: آپلود در Releases
        if: github.event.inputs.upload_method == 'release (GitHub Releases)'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ format('yt-{0}', github.run_number) }}
          name: "دانلود یوتیوب – ${{ github.run_number }}"
          files: release_files/*
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false

      - name: پاک‌سازی
        if: always()
        run: rm -rf release_files streams.json
