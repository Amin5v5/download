name: 'دانلودر یوتیوب'

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیو (YouTube URL)'
        required: true
        type: string
      output_format:
        description: 'نوع خروجی'
        required: true
        type: choice
        options:
          - 'mp4 (video)'
          - 'mp3 (audio only)'
        default: 'mp4 (video)'
      desired_quality:
        description: 'کیفیت (ویدیو: 720p, 1080p | صدا: 192kbps, 320kbps)'
        required: false
        type: string
        default: '720p'
      max_part_mb:
        description: 'حداکثر حجم هر قسمت (MB) – 0 = خودکار ۱۸۰۰ مگابایت'
        required: false
        type: string
        default: '90'
      upload_method:
        description: '📤 روش ذخیره نهایی'
        required: true
        type: choice
        options:
          - 'repository (push to repo)'
          - 'release (GitHub Releases)'
        default: 'repository (push to repo)'
      release_tag:
        description: '🏷️ نام تگ ریلیز (فقط در صورت انتخاب Release)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  youtube-download:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 نصب yt-dlp و ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip ffmpeg
          pip install --quiet yt-dlp

      - name: 📥 دانلود ویدیو/صدا
        run: |
          URL="${{ github.event.inputs.video_url }}"
          FORMAT="${{ github.event.inputs.output_format }}"
          QUAL="${{ github.event.inputs.desired_quality }}"
          MAX_MB="${{ github.event.inputs.max_part_mb }}"

          # ساخت پوشهٔ خروجی
          mkdir -p release_files

          if [ "$FORMAT" = "mp3 (audio only)" ]; then
            # دانلود صدا با کیفیت درخواستی
            BITRATE=$(echo "$QUAL" | sed 's/kbps//')
            yt-dlp -f "bestaudio[ext=m4a]" \
              --extract-audio \
              --audio-format mp3 \
              --audio-quality "${BITRATE}" \
              -o "release_files/%(title)s.%(ext)s" \
              "$URL"
          else
            # دانلود ویدیو با کیفیت درخواستی
            # تبدیل کیفیت به فرمت yt-dlp: مثلاً 720p -> bestvideo[height<=720]+bestaudio
            HEIGHT=$(echo "$QUAL" | sed 's/p//')
            yt-dlp -f "bestvideo[height<=${HEIGHT}]+bestaudio/best[height<=${HEIGHT}]" \
              --merge-output-format mp4 \
              -o "release_files/%(title)s.%(ext)s" \
              "$URL"
          fi

          # اگر فایلی دانلود نشد، خطا بده
          if [ -z "$(ls -A release_files)" ]; then
            echo "::error::هیچ فایلی دانلود نشد!"
            exit 1
          fi

          echo "✅ دانلود کامل شد"
          ls -lh release_files/

      - name: ✂️ تقسیم فایل حجیم (در صورت نیاز)
        run: |
          MAX_MB="${{ github.event.inputs.max_part_mb }}"
          if [ "$MAX_MB" -le 0 ] || [ "$MAX_MB" -gt 1900 ]; then
            MAX_MB=1800
          fi

          cd release_files
          for file in *; do
            if [ ! -f "$file" ]; then
              continue
            fi
            SIZE=$(stat -c%s "$file")
            MAX_BYTES=$((MAX_MB * 1024 * 1024))
            if [ "$SIZE" -gt "$MAX_BYTES" ]; then
              echo "🔪 تقسیم $file به قطعات ${MAX_MB}MB"
              BASE="${file%.*}"
              zip -r -s "${MAX_MB}m" "${BASE}.zip" "./$file"
              rm -- "$file"
            else
              echo "📦 $file نیازی به تقسیم ندارد ($(( SIZE / 1024 / 1024 )) MB)"
            fi
          done
          ls -lh

      - name: 📤 ذخیره در مخزن (Push to Repository)
        if: github.event.inputs.upload_method == 'repository (push to repo)'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p downloads
          mv release_files/* downloads/
          git add downloads/
          git commit -m "⬇️ YouTube: $(ls downloads/ | head -1) [skip ci]" || echo "Nothing to commit"
          git push

      - name: 📤 آپلود در GitHub Releases
        if: github.event.inputs.upload_method == 'release (GitHub Releases)'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('yt-{0}', github.run_number) }}
          name: "دانلود یوتیوب – ${{ github.run_number }}"
          body: |
            **📽️ لینک اصلی:** ${{ github.event.inputs.video_url }}
            **کیفیت/فرمت:** ${{ github.event.inputs.desired_quality }} / ${{ github.event.inputs.output_format }}
            **تاریخ دانلود:** $(date '+%Y-%m-%d %H:%M:%S')
          files: release_files/*
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false

      - name: 🧹 پاک‌سازی (همیشه اجرا شود)
        if: always()
        run: rm -rf release_files
