name: Download APK from Google Play

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'لینک گوگل پلی یا شناسه برنامه (مثال: com.instagram.android)'
        required: true
        default: 'com.instagram.android'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python (if needed)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Extract App ID
        id: extract
        run: |
          INPUT="${{ github.event.inputs.app_url }}"
          if [[ "$INPUT" == *"play.google.com"* ]]; then
            APP_ID=$(echo "$INPUT" | grep -oP '(?<=id=)[^&]+')
          else
            APP_ID="$INPUT"
          fi
          if [[ -z "$APP_ID" || "$APP_ID" == "None" ]]; then
            echo "❌ شناسه برنامه نامعتبر است"
            exit 1
          fi
          echo "app_id=$APP_ID" >> $GITHUB_OUTPUT
          echo "✅ شناسه: $APP_ID"

      - name: Download APK using gplay-apk-downloader
        run: |
          cd gplay-apk-downloader
          # در صورت نیاز، فایل google-account.json را از secret می‌خوانیم
          # echo "${{ secrets.GOOGLE_ACCOUNT_JSON }}" > google-account.json
          ./gplay download "${{ steps.extract.outputs.app_id }}" -a arm64 -o ../downloads -m
        env:
          # در صورت نیاز به proxy یا VPN می‌توان تنظیم کرد
          # HTTP_PROXY: ${{ secrets.PROXY_URL }}
          # HTTPS_PROXY: ${{ secrets.PROXY_URL }}
          pass

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-apk
          path: downloads/
